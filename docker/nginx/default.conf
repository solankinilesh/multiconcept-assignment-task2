server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    # Webhook providers send sizable payloads (Stripe wraps the full event object). Bump
    # the body limit so legitimate payloads aren't rejected at the edge.
    client_max_body_size 4m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Forward the real client IP so $request->getClientIp() returns the caller, not nginx.
        fastcgi_param REMOTE_ADDR $remote_addr;
        internal;
    }

    # Don't expose any other .php file by accident.
    location ~ \.php$ {
        return 404;
    }
}
