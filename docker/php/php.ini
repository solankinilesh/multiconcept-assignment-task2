; Dev image overrides — applied via /usr/local/etc/php/conf.d/zz-app.ini.
; The "zz-" prefix means these win against any earlier conf.d files.

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

memory_limit = 512M
max_execution_time = 60

; Opcache off in dev so code edits take effect immediately. In production we'd flip
; opcache.enable=1 and opcache.validate_timestamps=0 for deploy-immutable images.
opcache.enable = 0

date.timezone = UTC
